<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LabMon</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <nav class="topnav" aria-label="主导航">
        <button class="nav-link is-active" type="button" data-view="overview">LabMon</button>
        <button class="nav-link" type="button" data-view="gpu">GPU</button>
        <button class="nav-link" type="button" data-view="logs">Logs</button>
        <button class="nav-link" type="button" data-view="host">Server</button>
      </nav>
      <div class="topbar__meta">
        <span id="host-label">等待连接</span>
        <span id="user-label" class="session-label" hidden></span>
        <span id="mode-label" class="badge">demo</span>
        <span id="updated-label">未刷新</span>
        <button id="refresh-button" class="solid-button" type="button">refresh</button>
        <button id="logout-button" class="ghost-button topbar-logout" type="button" hidden>logout</button>
      </div>
    </header>

    <main class="page">
      <div id="warning-region" class="warning-region" aria-live="polite"></div>
      <div id="app-view" aria-live="polite"></div>
    </main>

    <dialog id="log-dialog" class="log-dialog">
      <div class="log-dialog__head">
        <div>
          <h2 id="dialog-title">日志</h2>
          <p id="dialog-path"></p>
        </div>
        <button id="close-dialog" class="solid-button" type="button" aria-label="关闭日志">close</button>
      </div>
      <pre id="log-content" class="log-content"></pre>
    </dialog>

    <script src="/static/app.js" defer></script>
  </body>
</html>
